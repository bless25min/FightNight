    <rect x="0" y="36" width="168" height="42" rx="21" fill="#17181c" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="26" y="65" fill="#ffffff" font-size="24" font-weight="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">SECTION 03</text>
    <text x="0" y="180" fill="#ffffff" font-size="96" font-weight="900" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">安全並且</text>
    <text x="0" y="294" fill="#ffffff" font-size="96" font-weight="900" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">精心編排的失控</text>

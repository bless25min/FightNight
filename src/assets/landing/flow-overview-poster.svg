<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">安全並且精心編排的失控</title>
  <desc id="desc">你可能會出神，事後忘記過程做了什麼，但不會受傷。</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040404" />
      <stop offset="60%" stop-color="#101114" />
      <stop offset="100%" stop-color="#19120f" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#030303" stop-opacity="0.98" />
      <stop offset="75%" stop-color="#0a0a0d" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#0a0a0d" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b30" />

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">2 程度分組與鏡像動作</title>
  <desc id="desc">根據暖身時的狀況，進行分組，讓大家專注在編排好的動作與節奏上。</desc>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#131417" />
    </linearGradient>
    <linearGradient id="panel2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020202" stop-opacity="0.98" />
      <stop offset="75%" stop-color="#09090c" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#09090c" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b30" />
      <stop offset="100%" stop-color="#ff7a21" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg2)" />
  <rect width="760" height="900" fill="url(#panel2)" />
  <g opacity="0.18">
    <path d="M1000 170 H1510" stroke="#ff3b30" stroke-width="3" />
    <path d="M1080 760 H1550" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" />
    <path d="M1190 180 V740" stroke="#ff3b30" stroke-opacity="0.12" stroke-width="2" />
    <path d="M1390 180 V740" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" />
  </g>
  <g transform="translate(92 112)">
    <text x="0" y="0" fill="#ff3b30" font-size="28" font-weight="800" font-family="'Arial Black', 'Noto Sans TC', sans-serif" letter-spacing="3">FLOW 02</text>
    <rect x="0" y="36" width="202" height="42" rx="21" fill="#17181c" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="26" y="65" fill="#ffffff" font-size="24" font-weight="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">GROUP &amp; MIRROR</text>
    <text x="0" y="190" fill="#ffffff" font-size="78" font-weight="900" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">程度分組與鏡像動作</text>
    <rect x="0" y="236" width="118" height="8" rx="4" fill="url(#accent2)" />
    <text x="0" y="352" fill="#f5f5f6" font-size="40" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
      <tspan x="0" dy="0">根據暖身時的狀況，進行分組，</tspan>
      <tspan x="0" dy="60">讓大家專注在編排好的動作與節奏上。</tspan>
    </text>
    <text x="0" y="676" fill="#d4d4d6" font-size="26" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">每個人都被放進最適合投入的節奏裡。</text>
  </g>
  <g transform="translate(1010 168)">
    <text x="0" y="0" fill="#ffffff" fill-opacity="0.08" font-size="420" font-weight="900" font-family="'Arial Black', Impact, sans-serif">2</text>
    <rect x="50" y="130" width="170" height="320" rx="28" fill="#0d0f12" stroke="#ff3b30" stroke-opacity="0.65" stroke-width="4" />
    <rect x="280" y="130" width="170" height="320" rx="28" fill="#0d0f12" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3" />
    <path d="M110 212 H164" stroke="#ff3b30" stroke-width="12" stroke-linecap="round" />
    <path d="M340 212 H394" stroke="#ffffff" stroke-opacity="0.85" stroke-width="12" stroke-linecap="round" />
    <path d="M110 292 H164" stroke="#ffffff" stroke-opacity="0.85" stroke-width="12" stroke-linecap="round" />
    <path d="M340 292 H394" stroke="#ff3b30" stroke-width="12" stroke-linecap="round" />
    <path d="M110 372 H164" stroke="#ff3b30" stroke-width="12" stroke-linecap="round" />
    <path d="M340 372 H394" stroke="#ffffff" stroke-opacity="0.85" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">4 全力專注並釋放情緒</title>
  <desc id="desc">隨著動作與節奏的堆疊，你漸漸專注到聽不見教練的吶喊聲，彷彿世界只剩下你跟沙包，只剩下純粹的情緒釋放。</desc>
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040404" />
      <stop offset="100%" stop-color="#17100d" />
    </linearGradient>
    <linearGradient id="panel4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020202" stop-opacity="0.98" />
      <stop offset="75%" stop-color="#09090c" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#09090c" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b30" />
      <stop offset="100%" stop-color="#ff7a21" />
    </linearGradient>
    <radialGradient id="pulse4" cx="78%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#ff3b30" stop-opacity="0.34" />
      <stop offset="100%" stop-color="#ff3b30" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg4)" />
  <rect width="760" height="900" fill="url(#panel4)" />
  <rect width="1600" height="900" fill="url(#pulse4)" />
  <g opacity="0.18">
    <circle cx="1250" cy="450" r="300" fill="none" stroke="#ff3b30" stroke-width="2" />
    <circle cx="1250" cy="450" r="220" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.6" />
    <path d="M1020 166 H1540" stroke="#ff3b30" stroke-width="3" />
    <path d="M1080 732 H1540" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2" />
  </g>
  <g transform="translate(92 112)">
    <text x="0" y="0" fill="#ff3b30" font-size="28" font-weight="800" font-family="'Arial Black', 'Noto Sans TC', sans-serif" letter-spacing="3">FLOW 04</text>
    <rect x="0" y="36" width="166" height="42" rx="21" fill="#17181c" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="26" y="65" fill="#ffffff" font-size="24" font-weight="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">LOCK IN</text>
    <text x="0" y="190" fill="#ffffff" font-size="78" font-weight="900" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">全力專注並釋放情緒</text>
    <rect x="0" y="236" width="118" height="8" rx="4" fill="url(#accent4)" />
    <text x="0" y="334" fill="#f5f5f6" font-size="34" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
      <tspan x="0" dy="0">隨著動作與節奏的堆疊，</tspan>
      <tspan x="0" dy="52">你漸漸專注到聽不見教練的吶喊聲，</tspan>
      <tspan x="0" dy="52">彷彿世界只剩下你跟沙包，</tspan>
      <tspan x="0" dy="52">只剩下純粹的情緒釋放。</tspan>
    </text>
    <text x="0" y="698" fill="#d4d4d6" font-size="26" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">當外界消失，身體與情緒會自己往前衝。</text>
  </g>
  <g transform="translate(980 142)">
    <text x="0" y="0" fill="#ffffff" fill-opacity="0.08" font-size="440" font-weight="900" font-family="'Arial Black', Impact, sans-serif">4</text>
    <rect x="104" y="142" width="360" height="420" rx="180" fill="#0d0f12" stroke="#ff3b30" stroke-opacity="0.68" stroke-width="4" />
    <circle cx="284" cy="352" r="116" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="3" />
    <circle cx="284" cy="352" r="74" fill="none" stroke="#ff3b30" stroke-width="8" />
    <circle cx="284" cy="352" r="18" fill="#ffffff" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">1 新手也能做到的動作</title>
  <desc id="desc">從任何人都能做到的簡單動作開始，讓教練快速判別每個人的身體能力差異。</desc>
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#151618" />
    </linearGradient>
    <linearGradient id="panel1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020202" stop-opacity="0.98" />
      <stop offset="75%" stop-color="#09090c" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#09090c" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b30" />
      <stop offset="100%" stop-color="#ff7a21" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg1)" />
  <rect width="760" height="900" fill="url(#panel1)" />
  <g opacity="0.18">
    <circle cx="1230" cy="460" r="280" fill="none" stroke="#ff3b30" stroke-width="2" />
    <circle cx="1230" cy="460" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" />
    <path d="M1000 180 H1510" stroke="#ff3b30" stroke-width="3" />
    <path d="M1120 730 H1540" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2" />
  </g>
  <g transform="translate(92 112)">
    <text x="0" y="0" fill="#ff3b30" font-size="28" font-weight="800" font-family="'Arial Black', 'Noto Sans TC', sans-serif" letter-spacing="3">FLOW 01</text>
    <rect x="0" y="36" width="194" height="42" rx="21" fill="#17181c" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="26" y="65" fill="#ffffff" font-size="24" font-weight="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">WARM START</text>
    <text x="0" y="190" fill="#ffffff" font-size="78" font-weight="900" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">新手也能做到的動作</text>
    <rect x="0" y="236" width="118" height="8" rx="4" fill="url(#accent1)" />
    <text x="0" y="352" fill="#f5f5f6" font-size="40" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
      <tspan x="0" dy="0">從任何人都能做到的簡單動作開始，</tspan>
      <tspan x="0" dy="60">讓教練快速判別每個人的身體能力差異。</tspan>
    </text>
    <text x="0" y="676" fill="#d4d4d6" font-size="26" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">從零進場，先讓身體跟節奏同步。</text>
  </g>
  <g transform="translate(1030 172)">
    <text x="0" y="0" fill="#ffffff" fill-opacity="0.08" font-size="420" font-weight="900" font-family="'Arial Black', Impact, sans-serif">1</text>
    <rect x="40" y="110" width="400" height="400" rx="36" fill="#0d0f12" stroke="#ff3b30" stroke-opacity="0.65" stroke-width="4" />
    <path d="M140 220 H344" stroke="#ffffff" stroke-opacity="0.82" stroke-width="16" stroke-linecap="round" />
    <path d="M140 290 H374" stroke="#ff3b30" stroke-width="16" stroke-linecap="round" />
    <path d="M140 360 H314" stroke="#ffffff" stroke-opacity="0.82" stroke-width="16" stroke-linecap="round" />
    <path d="M140 430 H352" stroke="#ff3b30" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>

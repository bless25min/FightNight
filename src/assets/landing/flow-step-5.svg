<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">5 歸屬與延續</title>
  <desc id="desc">你完成了平常不會做的事，你與運動夥伴互相激勵，全力克服共同的挑戰後，獲得了新的身份。</desc>
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040404" />
      <stop offset="100%" stop-color="#131315" />
    </linearGradient>
    <linearGradient id="panel5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020202" stop-opacity="0.98" />
      <stop offset="75%" stop-color="#09090c" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#09090c" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="accent5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3b30" />
      <stop offset="100%" stop-color="#ff7a21" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg5)" />
  <rect width="760" height="900" fill="url(#panel5)" />
  <g opacity="0.18">
    <path d="M1020 170 H1520" stroke="#ff3b30" stroke-width="3" />
    <path d="M1110 734 H1540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2" />
    <circle cx="1270" cy="450" r="250" fill="none" stroke="#ff3b30" stroke-width="2" />
    <circle cx="1270" cy="450" r="190" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.6" />
  </g>
  <g transform="translate(92 112)">
    <text x="0" y="0" fill="#ff3b30" font-size="28" font-weight="800" font-family="'Arial Black', 'Noto Sans TC', sans-serif" letter-spacing="3">FLOW 05</text>
    <rect x="0" y="36" width="194" height="42" rx="21" fill="#17181c" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="26" y="65" fill="#ffffff" font-size="24" font-weight="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">BELONG &amp; CONTINUE</text>
    <text x="0" y="190" fill="#ffffff" font-size="78" font-weight="900" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">歸屬與延續</text>
    <rect x="0" y="236" width="118" height="8" rx="4" fill="url(#accent5)" />
    <text x="0" y="344" fill="#f5f5f6" font-size="36" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
      <tspan x="0" dy="0">你完成了平常不會做的事，</tspan>
      <tspan x="0" dy="54">你與運動夥伴互相激勵，</tspan>
      <tspan x="0" dy="54">全力克服共同的挑戰後，</tspan>
      <tspan x="0" dy="54">獲得了新的身份。</tspan>
    </text>
    <text x="0" y="698" fill="#d4d4d6" font-size="26" font-weight="500" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">離場的不是原本那個你，而是剛加入群體的你。</text>
  </g>
  <g transform="translate(995 168)">
    <text x="0" y="0" fill="#ffffff" fill-opacity="0.08" font-size="420" font-weight="900" font-family="'Arial Black', Impact, sans-serif">5</text>
    <circle cx="270" cy="320" r="72" fill="#0d0f12" stroke="#ffffff" stroke-opacity="0.24" stroke-width="3" />
    <circle cx="390" cy="418" r="72" fill="#0d0f12" stroke="#ff3b30" stroke-opacity="0.72" stroke-width="4" />
    <circle cx="150" cy="418" r="72" fill="#0d0f12" stroke="#ff3b30" stroke-opacity="0.72" stroke-width="4" />
    <path d="M222 340 L318 398" stroke="#ffffff" stroke-opacity="0.4" stroke-width="4" />
    <path d="M198 418 H342" stroke="#ff3b30" stroke-width="6" />
  </g>
</svg>
